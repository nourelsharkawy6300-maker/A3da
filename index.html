<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة قعدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- الشاشة الرئيسية (App Screen) -->
    <main class="app-screen">
        <!-- الهيدر -->
        <header class="app-header">
            <img src="logo.png" alt="قعدة" class="app-logo" onerror="this.src='https://via.placeholder.com/100x40/000/fff?text=QA3DA'">
            <div class="fomo-pill">🔥 الطبعة الأولى قربت تخلص</div>
        </header>

        <!-- منطقة التفاعل (الكروت) -->
        <section class="interactive-stage">
            <h1 class="main-title">جاهز تفضح<br><span class="accent">صحابك؟</span></h1>
            <p class="subtitle">اضغط على الكروت واسحب 👇</p>
            
            <!-- مجموعة الكروت التفاعلية -->
            <div class="card-deck" id="cardDeck">
                <img src="card-back.png" class="deck-card c1" alt="كارت">
                <img src="character-card-back.png" class="deck-card c2" alt="كارت">
                <img src="card-face.png" class="deck-card c3" alt="كارت">
                <img src="character-card-face.png" class="deck-card c4" alt="كارت">
            </div>
        </section>

        <!-- الدوك السفلي (Bottom Dock) -->
        <nav class="bottom-dock">
            <div class="price-info">
                <span class="price">150 ج.م</span>
                <span class="shipping">الدفع عند الاستلام</span>
            </div>
            <button class="buy-btn" id="openSheetBtn">اطلب اللعبة</button>
        </nav>
    </main>

    <!-- شاشة الطلب المنبثقة (Bottom Sheet) -->
    <div class="bottom-sheet-overlay" id="bottomSheetOverlay"></div>
    <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-header">
            <div class="drag-handle"></div>
            <h2>تأكيد الطلب 🚀</h2>
            <button class="close-sheet" id="closeSheetBtn"><i class="fas fa-times"></i></button>
        </div>

        <div class="sheet-content">
            <form id="orderForm" class="app-form">
                <!-- اختيار الباقة -->
                <div class="package-selector">
                    <label class="package-card active" onclick="selectPackage(this, 150, 'علبة واحدة')">
                        <input type="radio" name="bundle" value="علبة واحدة" checked>
                        <span class="pkg-name">علبة واحدة</span>
                        <span class="pkg-price">150 ج.م</span>
                    </label>
                    <label class="package-card" onclick="selectPackage(this, 280, 'عرض الصحاب (علبتين)')">
                        <div class="badge">شحن مجاني</div>
                        <input type="radio" name="bundle" value="عرض الصحاب (علبتين)">
                        <span class="pkg-name">علبتين (صحاب)</span>
                        <span class="pkg-price">280 ج.م</span>
                    </label>
                </div>

                <!-- إضافة الهدية -->
                <label class="toggle-row">
                    <div class="toggle-info">
                        <span class="toggle-title">🎁 كروت التخصيص (+50 ج.م)</span>
                        <span class="toggle-desc">كارتين بصورة واسم من اختيارك</span>
                    </div>
                    <div class="switch">
                        <input type="checkbox" id="customEditionToggle" onchange="updateTotal()">
                        <span class="slider"></span>
                    </div>
                </label>

                <!-- الحقول الأساسية -->
                <div class="input-modern">
                    <input type="text" id="name" required placeholder=" ">
                    <label>الاسم ثلاثي</label>
                </div>
                
                <div class="input-modern">
                    <input type="tel" id="phone" required placeholder=" " pattern="^01[0125][0-9]{8}$">
                    <label>رقم الموبايل</label>
                    <div id="phone-error" class="error-text">رقم غير صحيح</div>
                </div>

                <div class="input-modern">
                    <textarea id="address" required placeholder=" " rows="2"></textarea>
                    <label>العنوان بالتفصيل (محافظة، شارع، علامة)</label>
                </div>

                <!-- الإجمالي والزرار -->
                <div class="sheet-footer">
                    <div class="total-bar">
                        <span>الإجمالي:</span>
                        <span id="sheet-total">150 ج.م</span>
                    </div>
                    <button type="submit" class="confirm-btn" id="submitBtn">تأكيد الأوردر</button>
                </div>
            </form>

            <div id="success-msg" class="hidden-msg">
                <i class="fas fa-check-circle success-icon"></i>
                <h3>تم الحجز بنجاح!</h3>
                <p>عشان الأوردر يخرجلك، أكد معانا على الواتساب دلوقتي.</p>
                <a href="#" id="waRedirectBtn" class="wa-btn"><i class="fab fa-whatsapp"></i> تأكيد على الواتساب</a>
            </div>
            
            <div id="cooldown-msg" class="hidden-msg">
                <i class="fas fa-info-circle warning-icon"></i>
                <h3>طلبك متسجل فعلاً</h3>
                <p>إحنا استلمنا طلبك وهنتواصل معاك قريب.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
